<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>epsilonpepsi</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    canvas { display: block; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>

<script>
let scene, camera, renderer;
let object, bgMesh;

let textures = [];
let index = 0;

let lastX = 0;
let move = 0;

init();
animate();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 💡 СВЕТ (очень важно)
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));

  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(3, 3, 5);
  scene.add(dir);

  const loader = new THREE.TextureLoader();

  textures = [
    loader.load("tex1.jpg", () => console.log("tex1 ok")),
    loader.load("tex2.jpg"),
    loader.load("tex3.jpg"),
    loader.load("tex4.jpg")
  ];

  // 🌌 ФОН (уходит назад, не перекрывает)
  const bg = new THREE.PlaneGeometry(50, 50);
  const bgMat = new THREE.MeshBasicMaterial({
    map: textures[0],
    side: THREE.DoubleSide
  });

  bgMesh = new THREE.Mesh(bg, bgMat);
  bgMesh.position.z = -10;
  scene.add(bgMesh);

  // 📦 МОДЕЛЬ
  const objLoader = new THREE.OBJLoader();

  objLoader.load(
    "model.obj",
    (obj) => {

      console.log("OBJ loaded");

      object = obj;

      // центрирование + масштаб
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3()).length();
      const center = box.getCenter(new THREE.Vector3());

      object.position.sub(center);
      object.scale.setScalar(2 / size);

      object.traverse((c) => {
        if (c.isMesh) {
          c.material = new THREE.MeshStandardMaterial({
            map: textures[0]
          });
        }
      });

      scene.add(object);
    },
    undefined,
    (err) => console.error("OBJ ERROR", err)
  );

  window.addEventListener("mousemove", onMove);
  window.addEventListener("resize", onResize);
}

function switchTex() {
  index = (index + 1) % textures.length;

  if (object) {
    object.traverse(c => {
      if (c.isMesh) c.material.map = textures[index];
    });
  }

  if (bgMesh) {
    bgMesh.material.map = textures[index];
  }
}

function onMove(e) {
  const dx = e.clientX - lastX;
  lastX = e.clientX;

  move += Math.abs(dx);

  if (move > 5) {
    move = 0;
    switchTex();
  }

  if (object) object.rotation.y += dx * 0.005;
}

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
</script>

</body>
</html>
