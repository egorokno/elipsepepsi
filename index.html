<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>3D + Sync Background Texture Switch</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>

<script>
let scene, camera, renderer;

let object;
let bgMesh;

let textures = [];
let textureIndex = 0;

let lastMouseX = 0;
let accumulatedMove = 0;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // LIGHT
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(2, 2, 5);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));

  const loaderTex = new THREE.TextureLoader();

  // 🔥 ТЕКСТУРЫ (одни и те же для фона и модели)
  textures = [
    loaderTex.load("tex1.jpg"),
    loaderTex.load("tex2.jpg"),
    loaderTex.load("tex3.jpg"),
    loaderTex.load("tex4.jpg")
  ];

  // =========================
  // 🎯 ФОН (как огромный plane)
  // =========================
  const bgGeometry = new THREE.PlaneGeometry(20, 20);

  const bgMaterial = new THREE.MeshBasicMaterial({
    map: textures[0],
    depthWrite: false
  });

  bgMesh = new THREE.Mesh(bgGeometry, bgMaterial);
  bgMesh.position.z = -5;
  scene.add(bgMesh);

  // =========================
  // 📦 OBJ МОДЕЛЬ
  // =========================
  const loaderOBJ = new THREE.OBJLoader();
  loaderOBJ.load("model.obj", (obj) => {
    object = obj;

    object.traverse((child) => {
      if (child.isMesh) {
        child.material = new THREE.MeshStandardMaterial({
          map: textures[0]
        });
      }
    });

    scene.add(object);
  });

  window.addEventListener("mousemove", onMouseMove);
  window.addEventListener("resize", onResize);
}

function switchTexture() {
  textureIndex = (textureIndex + 1) % textures.length;

  // модель
  if (object) {
    object.traverse((child) => {
      if (child.isMesh) {
        child.material.map = textures[textureIndex];
        child.material.needsUpdate = true;
      }
    });
  }

  // фон
  if (bgMesh) {
    bgMesh.material.map = textures[textureIndex];
    bgMesh.material.needsUpdate = true;
  }
}

function onMouseMove(event) {
  const dx = event.clientX - lastMouseX;
  lastMouseX = event.clientX;

  accumulatedMove += Math.abs(dx);

  // 🔥 каждые 5px — смена текстуры
  if (accumulatedMove > 5) {
    accumulatedMove = 0;
    switchTexture();
  }

  // параллакс вращение модели
  if (object) {
    object.rotation.y += dx * 0.005;
  }
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
</script>

</body>
</html>
